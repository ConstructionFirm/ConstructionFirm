<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConstructCo — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(30, 64, 175, 0.12);
    }
    .logo-wrap {
      width: 72px;
      height: 72px;
      background: #1e40af;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 20px;
    }
    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }
    .subtitle {
      font-size: 13px;
      font-weight: 600;
      color: #1e40af;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 28px;
    }
    .offline-icon {
      font-size: 56px;
      margin-bottom: 20px;
      display: block;
    }
    h2 {
      font-size: 18px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 10px;
    }
    p {
      font-size: 14px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .retry-btn {
      display: inline-block;
      padding: 12px 28px;
      background: #1e40af;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .retry-btn:hover {
      background: #1e3a8a;
      transform: translateY(-1px);
    }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #ef4444;
      font-weight: 600;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">🏗️</div>
    <h1>ConstructCo</h1>
    <p class="subtitle">Construction Management System</p>

    <span class="offline-icon">📡</span>
    <h2>You're Offline</h2>
    <p>Please check your internet connection and try again. Your cached data is still available once you reconnect.</p>

    <button class="retry-btn" onclick="window.location.reload()">↺ Try Again</button>

    <div class="status-bar">
      <span class="status-dot"></span>
      No internet connection detected
    </div>
  </div>
</body>
</html>
